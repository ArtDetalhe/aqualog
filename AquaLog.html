<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23040d14'/><text y='.9em' font-size='78' x='10'>🐠</text></svg>">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
// ── Backup ─────────────────────────────────────────────────────
function openBackup(){
  var payload={version:1,exportedAt:new Date().toISOString(),params:state.params,logs:state.logs,especies:state.especies,notas:state.notas,tanks:state.tanks};
  var json=JSON.stringify(payload,null,2);
  openModal('☁️ Backup dos Dados',
    '<div style="font-size:12px;color:#5b8fa8;line-height:1.5;margin-bottom:10px">Copie o texto abaixo e salve num arquivo <b style=color:#cce8f4>.txt</b> ou <b style=color:#cce8f4>.json</b> no Google Drive ou WhatsApp para você mesmo.</div>'+
    '<textarea id="backup-json" readonly style="min-height:200px;font-family:monospace;font-size:10px;color:#00e5c0;background:rgba(2,15,26,0.8)">'+esc(json)+'</textarea>'+
    '<button class="btn btn-full" style="margin-bottom:10px" onclick="copyBackup()">📋 Copiar tudo</button>'+
    '<div style="font-size:12px;color:#5b8fa8;margin-bottom:10px;text-align:center">— ou restaurar backup —</div>'+
    '<label>Colar JSON de backup para restaurar</label>'+
    '<textarea id="restore-json" style="min-height:80px;font-family:monospace;font-size:10px" placeholder="Cole o JSON aqui..."></textarea>'+
    '<button class="btn btn-full btn-ghost" onclick="restoreBackup()">⬆️ Restaurar</button>'
  );
  setTimeout(function(){ document.getElementById('backup-json').select(); },100);
}
function copyBackup(){
  var el=document.getElementById('backup-json');
  if(navigator.clipboard){ navigator.clipboard.writeText(el.value).then(function(){ alert('✅ Copiado! Cole num arquivo e salve.'); }); }
  else { el.select(); document.execCommand('copy'); alert('✅ Copiado!'); }
}
function restoreBackup(){
  var txt=document.getElementById('restore-json').value.trim(); if(!txt)return;
  try{
    var d=JSON.parse(txt);
    if(d.params) save('params',d.params);
    if(d.logs) save('logs',d.logs);
    if(d.especies) save('especies',d.especies);
    if(d.notas) save('notas',d.notas);
    if(d.tanks) save('tanks',d.tanks);
    closeModal(); alert('✅ Backup restaurado com sucesso!');
  }catch(e){ alert('❌ JSON inválido: '+e.message); }
}
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#040d14;color:#cce8f4;font-family:system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#0e3a5c;border-radius:4px}
input,textarea,select{-webkit-appearance:none;width:100%;background:rgba(2,15,26,0.8);border:1px solid rgba(0,200,224,0.2);border-radius:8px;color:#cce8f4;font-family:inherit;font-size:14px;padding:10px 12px;margin-bottom:12px;outline:none}
label{display:block;font-size:11px;font-weight:700;color:#5b8fa8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.card{background:rgba(10,37,64,0.7);border:1px solid rgba(0,200,224,0.18);border-radius:14px;padding:16px;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:100px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#00c8e0,#00e5c0);color:#020f1a}
.btn-full{width:100%}
.btn-ghost{background:transparent;border:1px solid rgba(0,200,224,0.25);color:#5b8fa8}
.btn-danger{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.3);color:#ff6b6b}
.del-btn{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.25);border-radius:8px;color:#ff6b6b;cursor:pointer;font-size:14px;padding:4px 9px;flex-shrink:0}
.nav-btn{flex-shrink:0;padding:8px 14px;border-radius:100px;border:1px solid rgba(0,200,224,0.18);background:rgba(10,37,64,0.7);color:#5b8fa8;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.nav-btn.active{background:linear-gradient(135deg,#1a5f8a,#0e3a5c);color:#00c8e0;border-color:#00c8e0;box-shadow:0 0 12px rgba(0,200,224,0.2)}
.section{display:none}.section.active{display:block}
.modal-overlay{position:fixed;inset:0;background:rgba(2,9,18,0.9);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0a2540;border:1px solid rgba(0,200,224,0.2);border-radius:14px 14px 0 0;padding:20px 16px 44px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:700;color:#00c8e0}

.confirm-overlay{position:fixed;inset:0;background:rgba(2,9,18,0.9);z-index:200;display:flex;align-items:center;justify-content:center}
.confirm-box{background:#0a2540;border:1px solid rgba(255,107,107,0.35);border-radius:14px;padding:28px 24px;max-width:300px;width:88%;text-align:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.pbadge{background:rgba(2,15,26,0.6);border:1px solid rgba(0,200,224,0.18);border-radius:10px;padding:10px 6px;text-align:center}
.pbadge .lbl{font-size:10px;font-weight:700;color:#5b8fa8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}

.sec-title{font-size:16px;font-weight:700;color:#e8f9fd}
.card-title{font-size:12px;letter-spacing:1.5px;color:#00c8e0;text-transform:uppercase;margin-bottom:12px}
.empty{text-align:center;color:#5b8fa8;padding:40px 0;font-size:14px}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px;background:rgba(0,200,224,0.1);border:1px solid rgba(0,200,224,0.25);color:#00c8e0}
.alert-warn{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:12px;background:rgba(255,209,102,0.12);border:1px solid rgba(255,209,102,0.3);color:#ffd166}
.alert-ok{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:12px;background:rgba(0,229,192,0.1);border:1px solid rgba(0,229,192,0.25);color:#00e5c0}
.stat-box{background:rgba(2,15,26,0.6);border:1px solid rgba(0,200,224,0.18);border-radius:12px;padding:14px;text-align:center}

</head>
<body>

<div id="app">
  <div class="loading">
    <div style="font-size:48px">🐠</div>
    <div style="color:#00c8e0;font-size:16px;font-weight:700;letter-spacing:2px">AQUALOG</div>
    <div style="color:#5b8fa8;font-size:13px">Conectando...</div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-overlay" id="confirm-modal" style="display:none">
  <div class="confirm-box">
    <div style="font-size:30px;margin-bottom:12px">🗑️</div>
    <div id="confirm-msg" style="font-size:15px;color:#cce8f4;margin-bottom:22px;line-height:1.5"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-ghost" onclick="confirmNo()">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmYes()">Excluir</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="main-modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── Firebase ─────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyC3P9xZLAFA4IaxkA7dwApAfLMuwmzY2QE",
  authDomain:"aqualog-3bfb0.firebaseapp.com",
  databaseURL:"https://aqualog-3bfb0-default-rtdb.firebaseio.com",
  projectId:"aqualog-3bfb0",
  storageBucket:"aqualog-3bfb0.firebasestorage.app",
  messagingSenderId:"394339304862",
  appId:"1:394339304862:web:67e26f47d44a9da418c28f"
});
var db = firebase.database();

// ── State ────────────────────────────────────────────────────
var state = { tab:'dashboard', params:[], logs:[], especies:[], notas:[], tanks:{}, confirmCb:null };

// ── Firebase sync ────────────────────────────────────────────
var loaded = {params:false,logs:false,especies:false,notas:false,tanks:false};
function checkLoaded(){ if(Object.values(loaded).every(Boolean)) render(); }

db.ref('params').on('value',function(s){ state.params=s.val()||[]; loaded.params=true; checkLoaded(); render(); });
db.ref('logs').on('value',function(s){ state.logs=s.val()||[]; loaded.logs=true; checkLoaded(); render(); });
db.ref('especies').on('value',function(s){ state.especies=s.val()||[]; loaded.especies=true; checkLoaded(); render(); });
db.ref('notas').on('value',function(s){ state.notas=s.val()||[]; loaded.notas=true; checkLoaded(); render(); });
db.ref('tanks').on('value',function(s){ state.tanks=s.val()||{}; loaded.tanks=true; checkLoaded(); render(); });

function save(path,val){ db.ref(path).set(val); }

// ── Helpers ──────────────────────────────────────────────────
function fmtDate(s){ if(!s)return''; var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function today(){ return new Date().toISOString().slice(0,10); }
function nowTime(){ var d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function pad(n){ return String(n).padStart(2,'0'); }
function daysDiff(s){ if(!s)return null; return Math.floor((new Date()-new Date(s+'T00:00:00'))/86400000); }
function phColor(v){ return v==null?'#5b8fa8':v>=6.5&&v<=7.5?'#00e5c0':v>=6&&v<=8?'#ffd166':'#ff6b6b'; }
function tempColor(v){ return v==null?'#5b8fa8':v>=24&&v<=27?'#00e5c0':v>=22&&v<=29?'#ffd166':'#ff6b6b'; }
function aColor(v){ return v==null?'#5b8fa8':v===0?'#00e5c0':v<0.25?'#ffd166':'#ff6b6b'; }
function nColor(v){ return v==null?'#5b8fa8':v===0?'#00e5c0':v<0.5?'#ffd166':'#ff6b6b'; }
function volL(c,l,a,p){ var v=(+c||0)*(+l||0)*(+a||0)*((+p||100)/100)/1000; return v>0?v.toFixed(1):null; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pbadge(lbl,val,color,unit){
  return '<div class="pbadge"><div class="lbl">'+lbl+'</div><div class="val" style="color:'+color+'">'+(val!=null&&val!==''?val:'—')+'</div>'+(unit?'<div class="unit">'+unit+'</div>':'')+'</div>';
}

// ── Confirm ──────────────────────────────────────────────────
function confirm2(msg,cb){ state.confirmCb=cb; document.getElementById('confirm-msg').textContent=msg; document.getElementById('confirm-modal').style.display='flex'; }
function confirmYes(){ document.getElementById('confirm-modal').style.display='none'; if(state.confirmCb)state.confirmCb(); state.confirmCb=null; }
function confirmNo(){ document.getElementById('confirm-modal').style.display='none'; state.confirmCb=null; }

// ── Modal ────────────────────────────────────────────────────
function openModal(title,html){ document.getElementById('modal-title').textContent=title; document.getElementById('modal-body').innerHTML=html; document.getElementById('main-modal').style.display='flex'; }
function closeModal(){ document.getElementById('main-modal').style.display='none'; }

// ── Nav ──────────────────────────────────────────────────────
function setTab(t){ state.tab=t; render(); }

// ── Render ───────────────────────────────────────────────────
function render(){
  var tabs=['dashboard','aquario','parametros','atividades','especies','notas'];
  var labels=['🏠 Início','🪣 Aquários','📊 Parâmetros','📝 Atividades','🐟 Espécies','📓 Notas'];
  var nav='<nav style="display:flex;gap:6px;padding:14px 16px;overflow-x:auto;position:relative;z-index:10">';
  tabs.forEach(function(t,i){ nav+='<button class="nav-btn'+(state.tab===t?' active':'')+'" onclick="setTab(\''+t+'\')">'+labels[i]+'</button>'; });
  nav+='</nav>';

  var content='';
  if(state.tab==='dashboard') content=renderDashboard();
  else if(state.tab==='aquario') content=renderAquario();
  else if(state.tab==='parametros') content=renderParametros();
  else if(state.tab==='atividades') content=renderAtividades();
  else if(state.tab==='especies') content=renderEspecies();
  else if(state.tab==='notas') content=renderNotas();

  document.getElementById('app').innerHTML=
    '<div style="position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,100,160,0.22) 0%,transparent 60%);pointer-events:none;z-index:0"></div>'+
    '<div style="position:relative;z-index:10;padding:18px 20px 0;display:flex;align-items:center;gap:10px">'+
      '<div style="width:38px;height:38px;background:linear-gradient(135deg,#00c8e0,#00e5c0);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px rgba(0,200,224,0.4)">🐠</div>'+
      '<span style="font-size:20px;font-weight:700;background:linear-gradient(90deg,#00c8e0,#00e5c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px">AQUALOG</span>'+
    '<button onclick="openBackup()" style="margin-left:auto;padding:6px 12px;border-radius:100px;border:1px solid rgba(0,229,192,0.4);background:rgba(0,229,192,0.1);color:#00e5c0;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer">☁️ Backup</button>'+
    '</div>'+
    nav+
    '<div style="position:relative;z-index:10;padding:0 16px 80px;max-width:680px;margin:0 auto">'+content+'</div>';
}

// ── Dashboard ─────────────────────────────────────────────────
function renderDashboard(){
  var last=state.params[0];
  var lastM=state.logs.find(function(l){return l.tipo&&(l.tipo.indexOf('Manutenção')>=0||l.tipo.indexOf('Troca')>=0);});
  var dias=lastM?daysDiff(lastM.data):null;
  var alert='';
  if(dias!==null) alert='<div class="'+(dias>=7?'alert-warn':'alert-ok')+'">'+(dias>=7?'⚠️ Última manutenção há '+dias+' dias — hora de agir!':'✅ Última manutenção há '+dias+' dias — tudo em dia!')+'</div>';

  var stats='<div class="grid2" style="margin-bottom:14px">';
  [[state.especies.length,'Espécies'],[state.logs.length,'Atividades'],[state.params.length,'Medições'],[dias!=null?dias:'—','Dias manut.']].forEach(function(r){
    stats+='<div class="stat-box"><div class="stat-num">'+r[0]+'</div><div class="stat-lbl">'+r[1]+'</div></div>';
  });
  stats+='</div>';

  var paramsCard='<div class="card"><div class="card-title">💧 Últimos Parâmetros</div>';
  if(last){
    paramsCard+='<div style="font-size:11px;color:#5b8fa8;margin-bottom:10px">'+fmtDate(last.data)+' '+last.hora+'</div>';
    paramsCard+='<div class="grid3">'+pbadge('pH',last.ph,phColor(last.ph))+pbadge('GH',last.gh,'#00c8e0','°dH')+pbadge('KH',last.kh,'#00c8e0','°dH')+pbadge('Temp',last.temp,tempColor(last.temp),'°C')+pbadge('NH₃',last.amonia,aColor(last.amonia),'ppm')+pbadge('NO₂',last.nitrito,nColor(last.nitrito),'ppm')+'</div>';
    if(last.obs) paramsCard+='<div style="font-size:12px;color:#5b8fa8;margin-top:8px;font-style:italic">"'+esc(last.obs)+'"</div>';
  } else { paramsCard+='<div class="empty">Nenhuma medição ainda</div>'; }
  paramsCard+='</div>';

  var logsCard='<div class="card"><div class="card-title">📋 Atividades Recentes</div>';
  if(!state.logs.length){ logsCard+='<div class="empty">Nenhuma atividade</div>'; }
  else { state.logs.slice(0,4).forEach(function(l){ logsCard+='<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,200,224,0.08)"><div style="font-size:20px;width:32px;text-align:center;flex-shrink:0">'+(l.tipo||'').split(' ')[0]+'</div><div><div style="font-size:11px;color:#5b8fa8;margin-bottom:3px">'+fmtDate(l.data)+' '+l.hora+'</div><div style="font-size:14px">'+esc(l.desc)+'</div></div></div>'; }); }
  logsCard+='</div>';
  return alert+stats+paramsCard+logsCard;
}

// ── Parâmetros ─────────────────────────────────────────────────
function renderParametros(){
  var h='<div class="sec-header"><span class="sec-title">Parâmetros</span><button class="btn" onclick="openParamModal()">+ Nova Medição</button></div>';
  if(!state.params.length) return h+'<div class="empty">💧 Nenhuma medição registrada</div>';
  state.params.forEach(function(p,i){
    h+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;font-weight:700;color:#00c8e0">📅 '+fmtDate(p.data)+' '+p.hora+'</span><button class="del-btn" onclick="delParam('+i+')">🗑</button></div>';
    h+='<div class="grid3">'+pbadge('pH',p.ph,phColor(p.ph))+pbadge('GH',p.gh,'#00c8e0','°dH')+pbadge('KH',p.kh,'#00c8e0','°dH')+pbadge('Temp',p.temp,tempColor(p.temp),'°C')+pbadge('NH₃',p.amonia,aColor(p.amonia),'ppm')+pbadge('NO₂',p.nitrito,nColor(p.nitrito),'ppm')+'</div>';
    if(p.obs) h+='<div style="font-size:12px;color:#5b8fa8;margin-top:8px;font-style:italic">"'+esc(p.obs)+'"</div>';
    h+='</div>';
  });
  return h;
}
function openParamModal(){
  openModal('💧 Nova Medição',
    '<div class="grid2"><div><label>Data</label><input type="date" id="p-data" value="'+today()+'"></div><div><label>Hora</label><input type="time" id="p-hora" value="'+nowTime()+'"></div></div>'+
    '<div class="grid3"><div><label>pH</label><input type="number" id="p-ph" step="0.1" placeholder="7.0"></div><div><label>GH °dH</label><input type="number" id="p-gh" step="0.5" placeholder="8"></div><div><label>KH °dH</label><input type="number" id="p-kh" step="0.5" placeholder="4"></div><div><label>Temp °C</label><input type="number" id="p-temp" step="0.1" placeholder="26"></div><div><label>Amônia ppm</label><input type="number" id="p-amonia" step="0.05" placeholder="0"></div><div><label>Nitrito ppm</label><input type="number" id="p-nitrito" step="0.05" placeholder="0"></div></div>'+
    '<label>Nitrato ppm (opcional)</label><input type="number" id="p-nitrato" step="1" placeholder="0">'+
    '<label>Observações</label><textarea id="p-obs" placeholder="Água clara, peixes ativos..."></textarea>'+
    '<button class="btn btn-full" onclick="saveParam()">💾 Salvar Medição</button>'
  );
}
function saveParam(){
  var d=document.getElementById('p-data').value; if(!d)return;
  var rec={id:Date.now(),data:d,hora:document.getElementById('p-hora').value,
    ph:parseFloat(document.getElementById('p-ph').value)||null,
    gh:parseFloat(document.getElementById('p-gh').value)||null,
    kh:parseFloat(document.getElementById('p-kh').value)||null,
    temp:parseFloat(document.getElementById('p-temp').value)||null,
    amonia:parseFloat(document.getElementById('p-amonia').value)||null,
    nitrito:parseFloat(document.getElementById('p-nitrito').value)||null,
    nitrato:parseFloat(document.getElementById('p-nitrato').value)||null,
    obs:document.getElementById('p-obs').value};
  var arr=[rec].concat(state.params); save('params',arr); closeModal();
}
function delParam(i){ confirm2('Excluir esta medição?',function(){ var a=state.params.slice(); a.splice(i,1); save('params',a); }); }

// ── Atividades ─────────────────────────────────────────────────
var TIPOS=["🔧 Manutenção","💧 Troca d'água","🌿 Plantas","🐟 Peixes/Fauna","💊 Medicamento","🔩 Equipamento","🍽️ Alimentação","📌 Outro"];
function renderAtividades(){
  var h='<div class="sec-header"><span class="sec-title">Atividades</span><button class="btn" onclick="openLogModal()">+ Nova</button></div>';
  if(!state.logs.length) return h+'<div class="empty">📝 Nenhuma atividade ainda</div>';
  state.logs.forEach(function(l,i){
    h+='<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="tag">'+esc(l.tipo)+'</span><span style="font-size:11px;color:#5b8fa8;margin-left:auto">'+fmtDate(l.data)+' '+l.hora+'</span><button class="del-btn" onclick="delLog('+i+')">🗑</button></div><div style="font-size:14px">'+esc(l.desc)+'</div></div>';
  });
  return h;
}
function openLogModal(){
  var opts=TIPOS.map(function(t){return'<option>'+t+'</option>';}).join('');
  openModal('📝 Nova Atividade',
    '<div class="grid2"><div><label>Data</label><input type="date" id="l-data" value="'+today()+'"></div><div><label>Hora</label><input type="time" id="l-hora" value="'+nowTime()+'"></div></div>'+
    '<label>Tipo</label><select id="l-tipo">'+opts+'</select>'+
    '<label>Descrição</label><textarea id="l-desc" placeholder="O que foi feito..."></textarea>'+
    '<button class="btn btn-full" onclick="saveLog()">💾 Salvar</button>'
  );
}
function saveLog(){
  var desc=document.getElementById('l-desc').value.trim(); if(!desc)return;
  var rec={id:Date.now(),data:document.getElementById('l-data').value,hora:document.getElementById('l-hora').value,tipo:document.getElementById('l-tipo').value,desc:desc};
  var arr=[rec].concat(state.logs); save('logs',arr); closeModal();
}
function delLog(i){ confirm2('Excluir esta atividade?',function(){ var a=state.logs.slice(); a.splice(i,1); save('logs',a); }); }

// ── Espécies ───────────────────────────────────────────────────
var EICONS=["🐠","🐟","🦐","🐌","🐢","🌿","🪸","🦞"];
var ETEMPS=["Pacífico","Semi-agressivo","Agressivo","Tímido","Sociável"];
function renderEspecies(){
  var h='<div class="sec-header"><span class="sec-title">Espécies</span><button class="btn" onclick="openEspecieModal()">+ Adicionar</button></div>';
  if(!state.especies.length) return h+'<div class="empty">🐟 Nenhuma espécie cadastrada</div>';
  state.especies.forEach(function(e,i){
    h+='<div class="card" style="display:flex;gap:14px;align-items:flex-start">';
    h+='<div style="width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;background:rgba(0,200,224,0.08);border:1px solid rgba(0,200,224,0.18);flex-shrink:0">'+esc(e.icon||'🐟')+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:4px">';
    h+='<div style="flex:1"><span style="font-size:15px;font-weight:700;color:#e8f9fd">'+esc(e.nome)+'</span><span style="color:#5b8fa8;font-size:13px;margin-left:6px">×'+esc(e.qtd||1)+'</span>';
    if(e.sci) h+='<div style="font-size:12px;font-style:italic;color:#5b8fa8">'+esc(e.sci)+'</div>';
    h+='</div><button onclick="editEspecie('+i+')" style="background:rgba(0,200,224,0.1);border:1px solid rgba(0,200,224,0.25);border-radius:8px;color:#00c8e0;cursor:pointer;font-size:14px;padding:4px 8px;flex-shrink:0">✏️</button><button class="del-btn" onclick="delEspecie('+i+')">🗑</button></div>';
    if(e.info) h+='<div style="font-size:13px;line-height:1.5;margin-bottom:6px">'+esc(e.info)+'</div>';
    h+='<div>';
    if(e.ph) h+='<span class="badge" style="color:#00c8e0;border-color:rgba(0,200,224,0.4);background:rgba(0,200,224,0.08)">pH '+esc(e.ph)+'</span>';
    if(e.temp) h+='<span class="badge" style="color:#00e5c0;border-color:rgba(0,229,192,0.4);background:rgba(0,229,192,0.08)">🌡 '+esc(e.temp)+'°C</span>';
    if(e.temperamento) h+='<span class="badge" style="color:#ffd166;border-color:rgba(255,209,102,0.4);background:rgba(255,209,102,0.08)">'+esc(e.temperamento)+'</span>';
    if(e.alim) h+='<span class="badge" style="color:#ff6b6b;border-color:rgba(255,107,107,0.4);background:rgba(255,107,107,0.08)">🍽 '+esc(e.alim)+'</span>';
    if(e.tamanho) h+='<span class="badge" style="color:#b482ff;border-color:rgba(180,130,255,0.4);background:rgba(180,130,255,0.08)">📏 até '+esc(e.tamanho)+'cm'+(e.tamanhoAtual?' · atual '+esc(e.tamanhoAtual)+'cm':'')+'</span>';
    if(e.data) h+='<span class="badge" style="color:#5b8fa8;border-color:rgba(0,200,224,0.18)">Desde '+fmtDate(e.data)+'</span>';
    h+='</div></div></div>';
  });
  return h;
}
function openEspecieModal(idx){
  var e=idx!=null?state.especies[idx]:{};
  var iconOpts=EICONS.map(function(ic){return'<option'+(e.icon===ic?' selected':'')+'>'+ic+'</option>';}).join('');
  var tempOpts=ETEMPS.map(function(t){return'<option'+(e.temperamento===t?' selected':'')+'>'+t+'</option>';}).join('');
  openModal(idx!=null?'✏️ Editar Espécie':'🐟 Nova Espécie',
    '<div class="grid2"><div><label>Nome popular</label><input type="text" id="e-nome" placeholder="Néon tetra" value="'+esc(e.nome||'')+'"></div><div><label>Nome científico</label><input type="text" id="e-sci" placeholder="P. innesi" value="'+esc(e.sci||'')+'"></div></div>'+
    '<div class="grid2"><div><label>Ícone</label><select id="e-icon">'+iconOpts+'</select></div><div><label>Quantidade</label><input type="number" id="e-qtd" min="1" placeholder="6" value="'+esc(e.qtd||'')+'"></div></div>'+
    '<div class="grid2"><div><label>pH ideal</label><input type="text" id="e-ph" placeholder="6.5 – 7.5" value="'+esc(e.ph||'')+'"></div><div><label>Temp ideal °C</label><input type="text" id="e-temp" placeholder="24 – 27" value="'+esc(e.temp||'')+'"></div></div>'+
    '<div class="grid2"><div><label>Alimentação</label><input type="text" id="e-alim" placeholder="Ração micro..." value="'+esc(e.alim||'')+'"></div><div><label>Temperamento</label><select id="e-temperamento">'+tempOpts+'</select></div></div>'+
    '<div class="grid2"><div><label>Tamanho adulto (cm)</label><input type="number" id="e-tamanho" step="0.5" placeholder="5" value="'+esc(e.tamanho||'')+'"></div><div><label>Tamanho atual (cm)</label><input type="number" id="e-tamanhoAtual" step="0.5" placeholder="3" value="'+esc(e.tamanhoAtual||'')+'"></div></div>'+
    '<label>Informações adicionais</label><textarea id="e-info" placeholder="Prefere cardume, fundo escuro...">'+esc(e.info||'')+'</textarea>'+
    '<label>Data de aquisição</label><input type="date" id="e-data" value="'+(e.data||today())+'">'+
    '<button class="btn btn-full" onclick="saveEspecie('+(idx!=null?idx:'null')+')">💾 Salvar Espécie</button>'
  );
}
function editEspecie(i){ openEspecieModal(i); }
function saveEspecie(idx){
  var nome=document.getElementById('e-nome').value.trim(); if(!nome)return;
  var arr=state.especies.slice();
  var rec={id:idx!=null?arr[idx].id:Date.now(),nome:nome,sci:document.getElementById('e-sci').value,icon:document.getElementById('e-icon').value,qtd:parseInt(document.getElementById('e-qtd').value)||1,ph:document.getElementById('e-ph').value,temp:document.getElementById('e-temp').value,alim:document.getElementById('e-alim').value,temperamento:document.getElementById('e-temperamento').value,tamanho:document.getElementById('e-tamanho').value,tamanhoAtual:document.getElementById('e-tamanhoAtual').value,info:document.getElementById('e-info').value,data:document.getElementById('e-data').value};
  if(idx!=null){ arr[idx]=rec; } else { arr=[rec].concat(arr); }
  save('especies',arr); closeModal();
}
function delEspecie(i){ confirm2('Excluir esta espécie?',function(){ var a=state.especies.slice(); a.splice(i,1); save('especies',a); }); }

// ── Notas ──────────────────────────────────────────────────────
function renderNotas(){
  var h='<div class="sec-header"><span class="sec-title">Notas</span><button class="btn" onclick="openNotaModal()">+ Nova Nota</button></div>';
  if(!state.notas.length) return h+'<div class="empty" style="padding:40px 20px"><div style="font-size:36px;margin-bottom:10px">📓</div><div>Nenhuma nota ainda</div><div style="font-size:12px;margin-top:6px;line-height:1.5">Anote curiosidades, rações,<br>novidades e dicas do aquário</div></div>';
  state.notas.forEach(function(n,i){
    var ts=n.updatedAt||n.createdAt; var d=ts?new Date(ts):null;
    var dtStr=d?(pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes())):'';
    h+='<div class="card"><div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">';
    h+='<div style="flex:1">'+(n.titulo?'<div style="font-size:14px;font-weight:700;color:#e8f9fd;margin-bottom:3px">'+esc(n.titulo)+'</div>':'')+'<div style="font-size:11px;color:#5b8fa8">'+dtStr+(n.updatedAt?' (editado)':'')+'</div></div>';
    h+='<button onclick="editNota('+i+')" style="background:rgba(0,200,224,0.1);border:1px solid rgba(0,200,224,0.25);border-radius:8px;color:#00c8e0;cursor:pointer;font-size:14px;padding:4px 8px;flex-shrink:0">✏️</button>';
    h+='<button class="del-btn" onclick="delNota('+i+')">🗑</button></div>';
    h+='<div style="font-size:14px;line-height:1.6;white-space:pre-wrap">'+esc(n.texto)+'</div></div>';
  });
  return h;
}
function openNotaModal(titulo,texto,idx){
  openModal(idx!=null?'✏️ Editar Nota':'📓 Nova Nota',
    '<label>Título (opcional)</label><input type="text" id="n-titulo" placeholder="Ex: Ração, Curiosidade..." value="'+esc(titulo||'')+'">'+
    '<label>Texto livre</label><textarea id="n-texto" placeholder="Escreva o que quiser aqui..." style="min-height:180px">'+esc(texto||'')+'</textarea>'+
    '<button class="btn btn-full" onclick="saveNota('+(idx!=null?idx:'null')+')">💾 Salvar Nota</button>'
  );
}
function saveNota(idx){
  var texto=document.getElementById('n-texto').value.trim(); if(!texto)return;
  var titulo=document.getElementById('n-titulo').value.trim();
  var arr=state.notas.slice();
  if(idx!=null){ arr[idx]=Object.assign({},arr[idx],{titulo:titulo,texto:texto,updatedAt:new Date().toISOString()}); }
  else { arr.unshift({id:Date.now(),titulo:titulo,texto:texto,createdAt:new Date().toISOString()}); }
  save('notas',arr); closeModal();
}
function editNota(i){ openNotaModal(state.notas[i].titulo,state.notas[i].texto,i); }
function delNota(i){ confirm2('Excluir esta nota?',function(){ var a=state.notas.slice(); a.splice(i,1); save('notas',a); }); }

// ── Aquários ───────────────────────────────────────────────────
var TANK_DEFS=[{key:'principal',label:'Aquário Principal',icon:'🐠',color:'#00c8e0'},{key:'sump',label:'Sump',icon:'⚙️',color:'#00e5c0'},{key:'hospital',label:'Aquário Hospital',icon:'🏥',color:'#ffd166'}];
var editingTank=null;
function renderAquario(){
  var total=0;
  TANK_DEFS.forEach(function(def){ var d=state.tanks[def.key]; if(d){var v=parseFloat(volL(d.comp,d.larg,d.alt,d.ocupacao||100));if(!isNaN(v))total+=v;} });
  var h='<div class="sec-header"><span class="sec-title">Meus Aquários</span>'+(total>0?'<span style="font-size:12px;font-weight:700;color:#00c8e0;background:rgba(0,200,224,0.1);border:1px solid rgba(0,200,224,0.25);padding:4px 12px;border-radius:100px">Total ~'+total.toFixed(1)+' L</span>':'')+'</div>';
  TANK_DEFS.forEach(function(def){
    var d=state.tanks[def.key]||{};
    var vol=volL(d.comp,d.larg,d.alt,d.ocupacao||100);
    var hasData=d.comp||d.larg||d.alt;
    var isEditing=editingTank===def.key;
    h+='<div class="card">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
    h+='<div style="display:flex;align-items:center;gap:10px"><div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,200,224,0.1);border:1px solid '+def.color+'60">'+def.icon+'</div>';
    h+='<div><div style="font-size:15px;font-weight:700;color:#e8f9fd">'+def.label+'</div>'+(vol&&!isEditing?'<div style="font-size:11px;color:'+def.color+';font-weight:700">~'+vol+' L</div>':'')+'</div></div>';
    h+='<button onclick="toggleTankEdit(\''+def.key+'\')" style="padding:6px 14px;border-radius:100px;border:1px solid '+def.color+'55;background:'+def.color+'18;color:'+def.color+';font-family:inherit;font-size:12px;font-weight:700;cursor:pointer">'+(isEditing?'✕ Cancelar':hasData?'✏️ Editar':'+ Configurar')+'</button>';
    h+='</div>';
    if(!isEditing&&hasData){
      h+='<div class="grid3" style="margin-bottom:10px">';
      [['Comprimento',d.comp,'cm'],['Largura',d.larg,'cm'],['Altura',d.alt,'cm']].forEach(function(r){
        h+='<div style="background:rgba(2,15,26,0.6);border:1px solid rgba(0,200,224,0.14);border-radius:10px;padding:10px 8px;text-align:center"><div style="font-size:10px;font-weight:700;color:#5b8fa8;text-transform:uppercase;margin-bottom:4px">'+r[0]+'</div><div style="font-size:18px;font-weight:700;color:'+def.color+'">'+r[1]+'</div><div style="font-size:10px;color:#5b8fa8;margin-top:2px">'+r[2]+'</div></div>';
      });
      h+='</div>';
      if(d.substrato||d.filtragem||d.iluminacao||d.obs){
        h+='<div style="background:rgba(2,15,26,0.4);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.8">';
        if(d.substrato) h+='<div><span style="color:#5b8fa8;font-weight:700">Substrato: </span>'+esc(d.substrato)+'</div>';
        if(d.filtragem) h+='<div><span style="color:#5b8fa8;font-weight:700">Filtragem: </span>'+esc(d.filtragem)+'</div>';
        if(d.iluminacao) h+='<div><span style="color:#5b8fa8;font-weight:700">Iluminação: </span>'+esc(d.iluminacao)+'</div>';
        if(d.obs) h+='<div style="font-style:italic;color:#5b8fa8">"'+esc(d.obs)+'"</div>';
        h+='</div>';
      }
    } else if(!isEditing&&!hasData){
      h+='<div style="text-align:center;color:#5b8fa8;padding:10px 0;font-size:13px">Nenhuma dimensão configurada</div>';
    }
    if(isEditing){
      h+='<div style="font-size:11px;font-weight:700;color:#5b8fa8;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">📐 Dimensões (cm)</div>';
      h+='<div class="grid3"><div><label>Comprimento</label><input type="number" id="tk-comp" step="0.5" placeholder="120" value="'+esc(d.comp||'')+'"></div><div><label>Largura</label><input type="number" id="tk-larg" step="0.5" placeholder="50" value="'+esc(d.larg||'')+'"></div><div><label>Altura</label><input type="number" id="tk-alt" step="0.5" placeholder="50" value="'+esc(d.alt||'')+'"></div></div>';
      h+='<label>% ocupação real</label><input type="number" id="tk-ocup" min="50" max="100" placeholder="80" value="'+esc(d.ocupacao||'')+'">';
      h+='<div style="font-size:11px;font-weight:700;color:#5b8fa8;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">⚙️ Equipamentos</div>';
      h+='<label>Substrato</label><input type="text" id="tk-sub" placeholder="Areia fina..." value="'+esc(d.substrato||'')+'">';
      h+='<label>Filtragem</label><input type="text" id="tk-fil" placeholder="Sump, canister..." value="'+esc(d.filtragem||'')+'">';
      h+='<label>Iluminação</label><input type="text" id="tk-ilu" placeholder="LED 50W..." value="'+esc(d.iluminacao||'')+'">';
      h+='<label>Observações</label><textarea id="tk-obs" placeholder="Notas gerais...">'+esc(d.obs||'')+'</textarea>';
      h+='<button class="btn btn-full" onclick="saveTank(\''+def.key+'\')">💾 Salvar</button>';
    }
    h+='</div>';
  });
  return h;
}
function toggleTankEdit(key){ editingTank=(editingTank===key?null:key); render(); }
function saveTank(key){
  var d={comp:document.getElementById('tk-comp').value,larg:document.getElementById('tk-larg').value,alt:document.getElementById('tk-alt').value,ocupacao:document.getElementById('tk-ocup').value,substrato:document.getElementById('tk-sub').value,filtragem:document.getElementById('tk-fil').value,iluminacao:document.getElementById('tk-ilu').value,obs:document.getElementById('tk-obs').value};
  var tanks=Object.assign({},state.tanks); tanks[key]=d; save('tanks',tanks); editingTank=null;
}

// ── Backup ─────────────────────────────────────────────────────
function openBackup(){
  var payload={version:1,exportedAt:new Date().toISOString(),params:state.params,logs:state.logs,especies:state.especies,notas:state.notas,tanks:state.tanks};
  var json=JSON.stringify(payload,null,2);
  openModal('☁️ Backup dos Dados',
    '<div style="font-size:12px;color:#5b8fa8;line-height:1.5;margin-bottom:10px">Copie o texto abaixo e salve num arquivo <b style=color:#cce8f4>.txt</b> ou <b style=color:#cce8f4>.json</b> no Google Drive ou WhatsApp para você mesmo.</div>'+
    '<textarea id="backup-json" readonly style="min-height:200px;font-family:monospace;font-size:10px;color:#00e5c0;background:rgba(2,15,26,0.8)">'+esc(json)+'</textarea>'+
    '<button class="btn btn-full" style="margin-bottom:10px" onclick="copyBackup()">📋 Copiar tudo</button>'+
    '<div style="font-size:12px;color:#5b8fa8;margin-bottom:10px;text-align:center">— ou restaurar backup —</div>'+
    '<label>Colar JSON de backup para restaurar</label>'+
    '<textarea id="restore-json" style="min-height:80px;font-family:monospace;font-size:10px" placeholder="Cole o JSON aqui..."></textarea>'+
    '<button class="btn btn-full btn-ghost" onclick="restoreBackup()">⬆️ Restaurar</button>'
  );
  setTimeout(function(){ document.getElementById('backup-json').select(); },100);
}
function copyBackup(){
  var el=document.getElementById('backup-json');
  if(navigator.clipboard){ navigator.clipboard.writeText(el.value).then(function(){ alert('✅ Copiado! Cole num arquivo e salve.'); }); }
  else { el.select(); document.execCommand('copy'); alert('✅ Copiado!'); }
}
function restoreBackup(){
  var txt=document.getElementById('restore-json').value.trim(); if(!txt)return;
  try{
    var d=JSON.parse(txt);
    if(d.params) save('params',d.params);
    if(d.logs) save('logs',d.logs);
    if(d.especies) save('especies',d.especies);
    if(d.notas) save('notas',d.notas);
    if(d.tanks) save('tanks',d.tanks);
    closeModal(); alert('✅ Backup restaurado com sucesso!');
  }catch(e){ alert('❌ JSON inválido: '+e.message); }
}
</script>
